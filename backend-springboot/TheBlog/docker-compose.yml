services:

  # 1. Redis for Caching
  redis:
    image: redis:7-alpine
    container_name: theblog-redis
    ports:
      - "6379:6379"

  # 2. RabbitMQ for Async Messaging
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: theblog-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # 3. LocalStack for AWS Emulation (S3)
  localstack:
    image: localstack/localstack:3
    container_name: theblog-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
