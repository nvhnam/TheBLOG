# === ENVIRONMENT SWITCH ===
# Set USE_LOCAL_CONFIG=true for local Docker services (LocalStack, Redis, RabbitMQ)
# Set USE_LOCAL_CONFIG=false for cloud services (Cloudinary, Upstash, CloudAMQP)
use.local.config=${USE_LOCAL_CONFIG:true}

spring.application.name=TheBlog
spring.jpa.show-sql=true
server.port=8080

# Database
spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL}
spring.mail.password=${APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=HikariCP
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
logging.level.com.zaxxer.hikari=TRACE

# Redis — local Docker (active when use.local.config=true; overridden by CloudRedisConfig when false)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
logging.level.org.springframework.cache=DEBUG

# RabbitMQ — local Docker (active when use.local.config=true; overridden by CloudRabbitMQConfig when false)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# AWS S3 / LocalStack (active when use.local.config=true)
aws.s3.bucket=${AWS_S3_BUCKET:theblog-bucket}
aws.s3.endpoint=${AWS_S3_ENDPOINT:http://localhost:4566}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.s3.access-key=${AWS_S3_ACCESS_KEY:test}
aws.s3.secret-key=${AWS_S3_SECRET_KEY:test}
aws.s3.public-url=${AWS_S3_PUBLIC_URL:http://localhost:4566}